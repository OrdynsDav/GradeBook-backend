# Fly.io — деплой из папки server: fly deploy
# Перед первым деплоем: fly secrets set DATABASE_URL="..." AUTH_TOKEN_PEPPER="..."

app = "gradebook-api"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
